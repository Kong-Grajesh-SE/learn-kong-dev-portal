_format_version: "1.0"
add-plugins:
- selectors:
  - "$..services[*]"
  overwrite: false
  plugins:
  - name: cors
    config:
      # NOTE: Browsers reject `Access-Control-Allow-Origin: *` together with
      # `credentials: true`. The portal Try-It widget needs credentials, so we
      # list explicit origins. Replace the demo entries with your portal's
      # custom domain once configured.
      origins:
      - "https://*.kongportals.com"
      - "http://localhost:8080"
      methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      - PATCH
      headers:
      - Accept
      - Accept-Version
      - Content-Length
      - Content-Type
      - Authorization
      - apikey
      exposed_headers:
      - X-Auth-Token
      - X-Kong-Upstream-Latency
      - X-Kong-Proxy-Latency
      credentials: true
      max_age: 3600
      preflight_continue: false
